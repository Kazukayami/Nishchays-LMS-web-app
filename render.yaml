services:
  - type: web
    name: nishchays-lms-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_COOKIE_SECURE
        value: "true"
      - key: JWT_COOKIE_SAMESITE
        value: "none"
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        value: admin@lms.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: INSTRUCTOR_EMAIL
        value: instructor@lms.com
      - key: INSTRUCTOR_PASSWORD
        sync: false
      - key: EMPLOYEE_EMAIL
        value: employee@lms.com
      - key: EMPLOYEE_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nishchays-lms-db
          property: connectionString

databases:
  - name: nishchays-lms-db
    databaseName: nishchays_lms
    user: nishchays_lms_user
